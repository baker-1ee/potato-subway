name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'expo-app/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: expo-app/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: expo-app
        run: npm ci

      - name: Expo prebuild
        working-directory: expo-app
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: npx expo prebuild --platform android --clean

      - name: Build debug APK
        working-directory: expo-app/android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: potato-subway-debug-${{ github.run_number }}
          path: expo-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
