name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'expo-app/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: expo-app/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: expo-app
        run: npm ci

      - name: Expo prebuild
        working-directory: expo-app
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: npx expo prebuild --platform android --clean

      - name: Generate signing keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/release.keystore \
            -storepass potato2024 \
            -alias potatokey \
            -keypass potato2024 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Potato Subway,O=jinung,C=KR"

      - name: Build release APK
        working-directory: expo-app/android
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$HOME/.android/release.keystore \
            -Pandroid.injected.signing.store.password=potato2024 \
            -Pandroid.injected.signing.key.alias=potatokey \
            -Pandroid.injected.signing.key.password=potato2024

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: potato-subway-${{ github.run_number }}
          path: expo-app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
